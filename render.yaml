services:
  # Game server (Colyseus + Express WebSocket)
  - type: web
    name: odogwu-empire-server
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npm run build:client
    startCommand: npm run start
    healthCheckPath: /health

# NOTE: The client (Vite static site) must be created manually on Render.
# Render Blueprint does not support type: static.
# See README for instructions.
