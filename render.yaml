services:
  # Game server (Colyseus + Express WebSocket)
  - type: web
    name: odogwu-empire-server
    runtime: node
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

  # Client (Vite static build)
  - type: static
    name: odogwu-empire-client
    buildCommand: npm run build:client
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false  # Set this in the Render dashboard after the server is deployed
                     # Value should be: wss://odogwu-empire-server.onrender.com
